name: player
description: Reproductor de música avanzado estilo Poweramp
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.11
  permission_handler: ^12.0.1
  audio_session: ^0.2.2
  rxdart: ^0.28.0
  on_audio_query: ^2.9.0
  device_preview: ^1.3.1
  provider: ^6.1.5+1
  marquee: ^2.3.0
  audiotags: ^1.1.3
  image_picker: ^1.2.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true